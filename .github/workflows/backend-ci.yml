name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

jobs:
  backend-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Verify app import
        working-directory: backend
        env:
          APP_NAME: Naphaa API
          API_V1_PREFIX: /api/v1
          APP_PORT: "8080"
          DEBUG: "true"
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: naphaa_test
          DB_USER: naphaa
          DB_PASSWORD: naphaa
          DB_SSLMODE: prefer
          JWT_SECRET_KEY: ci-secret
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "60"
          REFRESH_TOKEN_EXPIRE_MINUTES: "10080"
          CORS_ALLOWED_ORIGINS: '["*"]'
          SYNC_PULL_DEFAULT_LIMIT: "100"
          SYNC_PULL_MAX_LIMIT: "500"
          AUTH_RATE_LIMIT_MAX_REQUESTS: "30"
          AUTH_RATE_LIMIT_WINDOW_SECONDS: "60"
          DEFAULT_BUSINESS_TIMEZONE: Asia/Kathmandu
          DEFAULT_CALENDAR_MODE: BS
        run: uv run python -c "import app.main"

  backend-deploy:
    runs-on: ubuntu-latest
    needs: backend-build
    permissions:
      contents: read

    steps:
      - name: Configure SSH
        run: |
          set -euo pipefail
          test -n "${{ secrets.EC2_HOST }}"
          test -n "${{ secrets.EC2_USER }}"
          test -n "${{ secrets.EC2_SSH_KEY }}"
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/naphaa_ec2
          chmod 600 ~/.ssh/naphaa_ec2
          ssh-keyscan -T 10 -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/naphaa_ec2 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'EOF'
          set -euo pipefail
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"

          cd /home/ubuntu/naphaa
          git fetch origin
          git checkout main
          git pull --ff-only origin main

          cd backend
          uv sync
          uv run python -m alembic upgrade head

          sudo systemctl restart naphaa
          sudo systemctl status naphaa --no-pager

          for i in {1..20}; do
            if curl -fs http://127.0.0.1:8080/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for server..."
            sleep 2
          done

          echo "Health check failed"
          exit 1
          EOF
