name: Backend CI/CD

on:
  push:
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - '.github/workflows/backend-ci.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Verify app import
        working-directory: backend
        env:
          APP_NAME: Naphaa API
          API_V1_PREFIX: /api/v1
          APP_PORT: "8080"
          DEBUG: "true"
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: naphaa_test
          DB_USER: naphaa
          DB_PASSWORD: naphaa
          DB_SSLMODE: prefer
          JWT_SECRET_KEY: ci-secret
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "60"
          REFRESH_TOKEN_EXPIRE_MINUTES: "10080"
          CORS_ALLOWED_ORIGINS: '["*"]'
          SYNC_PULL_DEFAULT_LIMIT: "100"
          SYNC_PULL_MAX_LIMIT: "500"
          AUTH_RATE_LIMIT_MAX_REQUESTS: "30"
          AUTH_RATE_LIMIT_WINDOW_SECONDS: "60"
          DEFAULT_BUSINESS_TIMEZONE: Asia/Kathmandu
          DEFAULT_CALENDAR_MODE: BS
        run: uv run python -c "import app.main"

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: |
            .
            !.git
            !backend/.venv
            !backend/__pycache__/
            !backend/**/*.pyc
            !backend/.pytest_cache/
            !backend/.ruff_cache/
            !mobile
            !docs
            !infra
            !PROGRESS.md

  backend-deploy:
    runs-on: ubuntu-latest
    needs: backend-build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'naphaa'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_5EFD3E23500F4441B08DF8C70B103497 }}
