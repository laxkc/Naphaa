name: Backend CI/CD

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Verify app import
        working-directory: backend
        run: uv run python -c "import app.main"

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: |
            .
            !.git
            !backend/.venv
            !backend/__pycache__/
            !backend/**/*.pyc
            !backend/.pytest_cache/
            !backend/.ruff_cache/
            !mobile
            !docs
            !infra
            !PROGRESS.md

  backend-deploy:
    runs-on: ubuntu-latest
    needs: backend-build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'naphaa'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_5EFD3E23500F4441B08DF8C70B103497 }}
